<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Transcriber</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: #666;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
    }

    .status-indicator.recording {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }

    .status-indicator.ready {
      background: #22c55e;
    }

    .status-indicator.inactive {
      background: #9ca3af;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 14px;
      color: #333;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-start {
      background: #2563eb;
      color: white;
    }

    .btn-start:hover {
      background: #1d4ed8;
    }

    .btn-stop {
      background: #ef4444;
      color: white;
    }

    .btn-stop:hover {
      background: #dc2626;
    }

    .btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

    .platform-badge {
      display: inline-block;
      padding: 4px 8px;
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 12px;
    }

    .platform-badge.none {
      background: #fee2e2;
      color: #991b1b;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #999;
    }

    /* End Meeting Section */
    .end-meeting-section {
      display: none;
    }

    .end-meeting-section.visible {
      display: block;
    }

    .section-divider {
      height: 1px;
      background: #e5e7eb;
      margin: 20px 0;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-input::placeholder {
      color: #9ca3af;
    }

    .transcript-preview {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 12px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 12px;
      color: #4b5563;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .transcript-preview.empty {
      color: #9ca3af;
      font-style: italic;
      text-align: center;
      padding: 20px 12px;
    }

    .transcript-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .btn-send {
      background: #10b981;
      color: white;
    }

    .btn-send:hover:not(:disabled) {
      background: #059669;
    }

    .btn-send.sending {
      background: #6b7280;
      cursor: wait;
    }

    .btn-send.success {
      background: #10b981;
    }

    .btn-send.error {
      background: #ef4444;
    }

    .button-group {
      display: flex;
      gap: 8px;
    }

    .button-group .btn {
      flex: 1;
      padding: 12px 8px;
      font-size: 13px;
    }

    .btn-download {
      background: #6366f1;
      color: white;
    }

    .btn-download:hover {
      background: #4f46e5;
    }

    .send-status {
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      min-height: 18px;
    }

    .send-status.success {
      color: #059669;
    }

    .send-status.error {
      color: #dc2626;
    }

    .send-status.sending {
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #ffffff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Meeting Transcriber</h1>
    <p>Capture and transcribe your meetings</p>
  </div>

  <div class="status">
    <div id="statusIndicator" class="status-indicator inactive"></div>
    <span id="statusText" class="status-text">Detecting platform...</span>
  </div>

  <button id="toggleBtn" class="btn btn-start" disabled>
    Start Transcription
  </button>

  <div style="text-align: center;">
    <span id="platformBadge" class="platform-badge none">No meeting detected</span>
  </div>

  <!-- End Meeting Section (hidden initially) -->
  <div id="endMeetingSection" class="end-meeting-section">
    <div class="section-divider"></div>

    <h2 class="section-title">Enviar Transcripción</h2>

    <div class="form-group">
      <label class="form-label" for="recipientName">Empresa / Persona</label>
      <input
        type="text"
        id="recipientName"
        class="form-input"
        placeholder="Ej: Acme Corp, Juan Pérez"
      >
    </div>

    <div class="form-group">
      <label class="form-label">Vista previa de transcripción</label>
      <div class="transcript-meta">
        <span id="transcriptDuration">Duración: --</span>
        <span id="transcriptWords">Palabras: --</span>
      </div>
      <div id="transcriptPreview" class="transcript-preview empty">
        Cargando transcripción...
      </div>
    </div>

    <div class="button-group">
      <button id="downloadBtn" class="btn btn-download">
        Descargar .txt
      </button>
      <button id="sendBtn" class="btn btn-send" disabled>
        Enviar resumen
      </button>
    </div>

    <div id="sendStatus" class="send-status"></div>
  </div>

  <div class="footer">
    Transcription will be emailed when meeting ends
  </div>

  <script src="popup.js"></script>
</body>
</html>
